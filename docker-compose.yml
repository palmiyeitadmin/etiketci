services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: plms
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plms"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=plms;Username=postgres;Password=localpass
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - Jwt__Key=PLMS_SUPER_SECRET_KEY_2026_DEVELOPMENT_ONLY
      - Jwt__Issuer=PLMS_API
      - FrontendUrl=http://localhost:3000
      - SeedAdmin__Email=admin@plms.local
      - SeedAdmin__Password=Admin123!
      - SeedAdmin__ForceResetPassword=true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5001
        NEXT_PUBLIC_EDITOR_ENGINE: konva
        NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001
      - NEXT_PUBLIC_EDITOR_ENGINE=konva
      - API_INTERNAL_URL=http://backend:5001
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=changeme_local_secret
    depends_on:
      backend:
        condition: service_started

volumes:
  db-data:
