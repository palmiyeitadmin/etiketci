services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpass}
      POSTGRES_DB: ${POSTGRES_DB:-plms}
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    pull_policy: build
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-plms};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-localpass}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5001
      Jwt__Key: ${JWT_KEY:-PLMS_SUPER_SECRET_KEY_2026_DEVELOPMENT_ONLY}
      Jwt__Issuer: ${JWT_ISSUER:-PLMS_API}
      FrontendUrl: ${APP_PUBLIC_ORIGIN:-https://ticket.palmiyebt.com}
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL:-admin@plms.local}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:-Admin123!}
      SeedAdmin__ForceResetPassword: ${SEED_ADMIN_FORCE_RESET_PASSWORD:-true}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    pull_policy: build
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_ORIGIN:-https://api.palmiyebt.com}
        NEXT_PUBLIC_EDITOR_ENGINE: ${NEXT_PUBLIC_EDITOR_ENGINE:-konva}
        NEXTAUTH_URL: ${APP_PUBLIC_ORIGIN:-https://ticket.palmiyebt.com}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_ORIGIN:-https://api.palmiyebt.com}
      NEXT_PUBLIC_EDITOR_ENGINE: ${NEXT_PUBLIC_EDITOR_ENGINE:-konva}
      API_INTERNAL_URL: http://backend:5001
      NEXTAUTH_URL: ${APP_PUBLIC_ORIGIN:-https://ticket.palmiyebt.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme_local_secret}
    depends_on:
      backend:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}

volumes:
  db-data:
    name: ${DB_VOLUME_NAME:-plms-db-data}
